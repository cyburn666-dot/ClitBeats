<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Private Demo Playlist</title>
  <style>
    :root {
      --border: #ddd;
      --text: #222;
      --muted: #666;
      --bg: #fff;
      --hover: #f6f6f6;
      --active: #eef4ff;
      --control-active: #111;
      --control-bg: #f7f7f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 1080px;
      margin: 28px auto;
      padding: 0 16px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .top {
      display: grid;
      grid-template-columns: 280px minmax(0,1fr);
      gap: 18px;
    }
    .top.no-cover {
      grid-template-columns: minmax(0, 1fr);
    }
    .top.no-cover #coverContainer {
      display: none;
    }

    .cover-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #coverPlaceholder {
      color: var(--muted);
      font-size: 14px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      align-items: center;
      margin-top: 12px;
    }
    input[type="password"] {
      /* flex: 1 1 260px; */
      flex:auto;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
    }
    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font: inherit;
    }
    button:hover {
      background: var(--hover);
    }
    .status {
      margin-top: 10px;
      min-height: 24px;
      color: var(--muted);
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .player-box {
      margin-top: 14px;
    }
    audio {
      width: 100%;
    }
    .player-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: nowrap;
      margin-top: 5px;
    }
    .action-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    #nextBtn {
      margin-left: auto;
    }

    .icon-btn {
      min-width: 40px;
      color: #222;
      height: 40px;
      padding: 0 6px;
      border-radius: 12px;
      background: var(--control-bg);
      font-size: 20px;
      line-height: 1;
      display: inline-flex;
      /* display: flex; */
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .mode-btn.active {
      color: #fff;
      background: var(--control-active);
      border-color: var(--control-active);
    }
    .mode-label {
      color: var(--muted);
      font-size: 13px;
    }
    .now-playing {
      margin-top: 10px;
      font-weight: 600;
    }
    .lyrics-panel {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 280px;
      max-height: 420px;
      overflow-y: auto;
      background: #fcfcfc;
    }
    .lyrics-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .lyrics-plain {
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .lrc-line {
      padding: 6px 0;
      color: #666;
      transition: all 0.18s ease;
    }
    .lrc-line.active {
      color: #111;
      font-weight: 700;
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .track {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    .track:first-child { border-top: none; }
    .track.active { background: var(--active); }
    .track-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .small {
      color: var(--muted);
      font-size: 13px;
    }
    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .hidden { display: none; }
    @media (max-width: 760px) {
      .top { grid-template-columns: 1fr; }
      .track {
        grid-template-columns: 44px 1fr auto;
        align-items: center;
        gap: 8px;
      }
      .track button {
        grid-column: auto;
        justify-self: end;
        white-space: nowrap;
        padding: 8px 10px;
      }
      .player-actions {
        align-items: stretch;
      }
      .action-group {
        width: 100%;
      }
      .action-group.mode-group {
        justify-content: space-between;
      }
      .mode-label {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div id ="coverContainer" class="cover-box">
          <img id="cover" alt="cover" />
          <div id="coverPlaceholder">暂无封面</div>
        </div>

        <div>
          <h1>Clit Beats Playlist</h1>
          <!-- <p>音频按 2MB 以内分段加载与缓存，缓存达到约 500MB 时再清理到约 380MB。</p> -->

          <div class="row">
            <input id="password" type="password" placeholder="输入口令" />
            <button id="unlockBtn">解锁</button>
          </div>

          <div id="status" class="status">正在加载歌单…</div>
          <div id="cacheMeta" class="meta">缓存：--</div>

          <div class="player-box">
            <audio id="player" controls preload="metadata"></audio>

            <div class="player-actions">
              <!-- <div class="action-group transport-group"> -->
                <button id="modeBtn" class="icon-btn" type="button" title="播放模式">🔁</button>
                <button id="prevBtn" class="icon-btn" type="button" aria-label="上一首" title="上一首">◀️</button>
                <div id="audioInfo" class="status"></div>
                <button id="nextBtn" class="icon-btn" type="button" aria-label="下一首" title="下一首">▶️</button>
                <button id="listBtn" class="icon-btn" type="button" title="列表查看">≡</button>
              <!-- </div> -->
            </div>

            <!-- <div id="nowPlaying" class="now-playing">未播放</div> -->
          </div>

          <div class="lyrics-panel" id="lyricsPanel">
            <div class="lyrics-title">歌词</div>
            <div id="lyricsContent" class="lyrics-plain">暂无歌词</div>
          </div>
        </div>
      </div>
    </div>

    <ul id="trackList" class="list hidden"></ul>
  </div>

  <script src="./app.js"></script>
</body>
</html>
