<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Private Demo Playlist</title>
  <style>
    :root {
      --border: #ddd;
      --text: #222;
      --muted: #666;
      --bg: #fff;
      --hover: #f6f6f6;
      --active: #eef4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 1080px;
      margin: 28px auto;
      padding: 0 16px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .top {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }
    .cover-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #coverPlaceholder {
      color: var(--muted);
      font-size: 14px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }
    input[type="password"] {
      flex: 1 1 260px;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
    }
    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font: inherit;
    }
    button:hover {
      background: var(--hover);
    }
    .status {
      margin-top: 10px;
      min-height: 24px;
      color: var(--muted);
    }
    .player-box {
      margin-top: 14px;
    }
    audio {
      width: 100%;
    }
    .now-playing {
      margin-top: 10px;
      font-weight: 600;
    }
    .lyrics-panel {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 280px;
      max-height: 420px;
      overflow: auto;
      background: #fcfcfc;
    }
    .lyrics-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .lyrics-plain {
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .lrc-line {
      padding: 6px 0;
      color: #666;
      transition: all 0.18s ease;
    }
    .lrc-line.active {
      color: #111;
      font-weight: 700;
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .track {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    .track:first-child { border-top: none; }
    .track.active { background: var(--active); }
    .track-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .small {
      color: var(--muted);
      font-size: 13px;
    }
    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .hidden { display: none; }
    @media (max-width: 760px) {
      .top { grid-template-columns: 1fr; }
      .track { grid-template-columns: 56px 1fr; }
      .track button { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="cover-box">
          <img id="cover" alt="cover" />
          <div id="coverPlaceholder">暂无封面</div>
        </div>

        <div>
          <h1>Private Demo Playlist</h1>
          <p>输入口令后解锁曲库。大文件密文不会因换口令而重传，口令只用于解开小索引。</p>

          <div class="row">
            <input id="password" type="password" placeholder="输入口令" />
            <button id="unlockBtn">解锁</button>
          </div>

          <div id="status" class="status">正在加载歌单…</div>

          <div class="player-box">
            <audio id="player" controls preload="metadata"></audio>
            <div id="nowPlaying" class="now-playing">未播放</div>
          </div>

          <div class="lyrics-panel" id="lyricsPanel">
            <div class="lyrics-title">歌词</div>
            <div id="lyricsContent" class="lyrics-plain">暂无歌词</div>
          </div>
        </div>
      </div>
    </div>

    <ul id="trackList" class="list hidden"></ul>
  </div>

  <script src="./app.js"></script>
</body>
</html>
