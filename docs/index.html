<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Private Demo Playlist</title>
  <style>
    :root {
      --border: #ddd;
      --text: #222;
      --muted: #666;
      --bg: #fff;
      --hover: #f5f5f5;
      --active: #eef4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 920px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }
    input[type="password"] {
      flex: 1 1 260px;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
    }
    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font: inherit;
    }
    button:hover {
      background: var(--hover);
    }
    .status {
      margin-top: 10px;
      min-height: 24px;
      color: var(--muted);
    }
    .player-box {
      margin-top: 14px;
    }
    audio {
      width: 100%;
    }
    .now-playing {
      margin-top: 10px;
      font-weight: 600;
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .track {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    .track:first-child {
      border-top: none;
    }
    .track.active {
      background: var(--active);
    }
    .track-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .small {
      color: var(--muted);
      font-size: 13px;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 640px) {
      .track {
        grid-template-columns: 56px 1fr;
      }
      .track button {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Private Demo Playlist</h1>
      <p>输入口令后可播放歌单中的单曲。页面不会一次性解密全部音频。</p>

      <div class="row">
        <input id="password" type="password" placeholder="输入口令" />
        <button id="unlockBtn">验证口令</button>
      </div>

      <div id="status" class="status">正在加载歌单…</div>

      <div class="player-box">
        <audio id="player" controls preload="metadata"></audio>
        <div id="nowPlaying" class="now-playing">未播放</div>
      </div>
    </div>

    <ul id="trackList" class="list hidden"></ul>
  </div>

  <script src="./app.js"></script>
</body>
</html>
